<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Console Log Exporter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <p>LOCALHOST LOGGER</p>
          <h1>Console Log Exporter</h1>
        </div>
        <button id="refreshButton" type="button">Refresh</button>
      </header>

      <label class="field">
        <span>Filter prefix / text</span>
        <input id="filterInput" type="search" value="[DnD" placeholder="[DnD / [Test / taskId" />
      </label>

      <label class="field">
        <span>Expected numbers</span>
        <input id="expectedInput" type="text" placeholder="1-1, 1-2, 1-3, 1-4" />
      </label>

      <section class="actions">
        <button id="copyButton" type="button">Copy for Codex</button>
        <button id="exportButton" type="button">Export JSON</button>
        <button id="compactButton" type="button">Compact Off</button>
        <button id="clearButton" type="button" class="danger">Clear</button>
      </section>

      <section class="summary">
        <span id="logCount">0 logs</span>
        <span id="numberSummary">numbers: none</span>
      </section>

      <pre id="codexPreview"></pre>
      <section id="logList" class="log-list"></section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
